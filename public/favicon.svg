<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Light tile so gold type stays readable on dark browser tabs -->
  <rect width="64" height="64" rx="10" fill="#f6f4ee"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="8.5" fill="none" stroke="#000" stroke-width="3"/>
  <text
    x="32"
    y="28"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', Times, serif"
    font-size="18"
    font-weight="700"
    fill="#c9a227"
    stroke="#000000"
    stroke-width="2.5"
    paint-order="stroke fill"
    stroke-linejoin="round"
  >For</text>
  <text
    x="32"
    y="49"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', Times, serif"
    font-size="16"
    font-weight="700"
    fill="#c9a227"
    stroke="#000000"
    stroke-width="2.5"
    paint-order="stroke fill"
    stroke-linejoin="round"
  >Today</text>
</svg>
